<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Ramakrishna Vivekananda Ashrama, Bidar</title>
  <meta name="description" content="Contact Ramakrishna Vivekananda Ashrama, Bidar. Visit us, call, or send a message.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased">

  <div id="site-header-mount"></div>

  <!-- ============ PAGE HEADER ============ -->
  <section class="relative bg-[var(--primary-dark)] py-20 sm:py-28 overflow-hidden">
    <div class="absolute inset-0 opacity-25" style="background-image:url('assets/images/Screenshot-505.webp');background-size:cover;background-position:center;"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-[var(--primary-dark)] via-[var(--primary-dark)]/70 to-[var(--primary-dark)]/40"></div>
    <div class="relative max-w-4xl mx-auto px-4 sm:px-6 text-center">
      <span class="tag-eyebrow" style="color: var(--gold);">✿ Visit Us</span>
      <h1 class="font-display font-bold text-4xl sm:text-6xl text-white mt-3" id="contact-heading"></h1>
      <p class="text-white/75 mt-4 max-w-xl mx-auto" id="contact-body"></p>
    </div>
  </section>

  <!-- ============ CONTACT INFO + FORM ============ -->
  <section class="bg-white py-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 grid lg:grid-cols-5 gap-12">

      <!-- left: info -->
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-[var(--cream)] rounded-2xl p-6 border-t-4 border-[var(--saffron)]">
          <h3 class="font-display font-bold text-lg text-[var(--text-dark)] mb-1">Address</h3>
          <p class="text-[var(--text-muted)]" id="contact-address"></p>
        </div>
        <div class="bg-[var(--cream)] rounded-2xl p-6 border-t-4 border-[var(--saffron)]">
          <h3 class="font-display font-bold text-lg text-[var(--text-dark)] mb-1">Phone</h3>
          <p class="text-[var(--text-muted)]"><a id="contact-phone" class="hover:text-[var(--saffron)] transition-colors" href=""></a></p>
        </div>
        <div class="bg-[var(--cream)] rounded-2xl p-6 border-t-4 border-[var(--saffron)]">
          <h3 class="font-display font-bold text-lg text-[var(--text-dark)] mb-1">Email</h3>
          <p class="text-[var(--text-muted)]"><a id="contact-email" class="hover:text-[var(--saffron)] transition-colors" href=""></a></p>
        </div>
        <div class="bg-[var(--cream)] rounded-2xl p-6 border-t-4 border-[var(--saffron)]">
          <h3 class="font-display font-bold text-lg text-[var(--text-dark)] mb-3">Opening Hours</h3>
          <table class="w-full text-sm" id="contact-hours-table"></table>
        </div>
      </div>

      <!-- right: form -->
      <div class="lg:col-span-3">
        <h2 class="font-display font-bold text-3xl text-[var(--text-dark)] mb-2">Send Us a Message</h2>
        <p class="text-sm text-[var(--text-muted)] mb-6" id="contact-form-note"></p>
        <form id="contact-form" class="space-y-5">
          <div class="grid sm:grid-cols-2 gap-5">
            <div>
              <label for="name" class="block text-sm font-semibold text-[var(--text-dark)] mb-1.5">Full Name</label>
              <input type="text" id="name" name="name" required class="w-full px-4 py-2.5 rounded-xl border border-amber-900/15 bg-[var(--cream)] focus:outline-none focus:ring-2 focus:ring-[var(--saffron)]">
            </div>
            <div>
              <label for="email" class="block text-sm font-semibold text-[var(--text-dark)] mb-1.5">Email Address</label>
              <input type="email" id="email" name="email" required class="w-full px-4 py-2.5 rounded-xl border border-amber-900/15 bg-[var(--cream)] focus:outline-none focus:ring-2 focus:ring-[var(--saffron)]">
            </div>
          </div>
          <div>
            <label for="phone" class="block text-sm font-semibold text-[var(--text-dark)] mb-1.5">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="w-full px-4 py-2.5 rounded-xl border border-amber-900/15 bg-[var(--cream)] focus:outline-none focus:ring-2 focus:ring-[var(--saffron)]">
          </div>
          <div>
            <label for="message" class="block text-sm font-semibold text-[var(--text-dark)] mb-1.5">Message</label>
            <textarea id="message" name="message" rows="5" required class="w-full px-4 py-2.5 rounded-xl border border-amber-900/15 bg-[var(--cream)] focus:outline-none focus:ring-2 focus:ring-[var(--saffron)] resize-none"></textarea>
          </div>
          <button type="submit" class="btn-saffron">Send Message</button>
          <p id="form-success" class="text-sm text-green-700 font-semibold hidden">Thank you — your message has been noted. We'll get back to you soon.</p>
        </form>
      </div>
    </div>
  </section>

  <!-- ============ MAP ============ -->
  <section class="bg-[var(--cream)] py-16">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <div class="rounded-2xl overflow-hidden gold-border shadow-lg">
        <iframe id="contact-map" width="100%" height="420" style="border:0;" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Ashrama location map"></iframe>
      </div>
    </div>
  </section>

  <div id="site-footer-mount"></div>

  <script src="content.js"></script>
  <script src="common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const { org, contact, openingHours } = SITE;
      document.getElementById('contact-heading').textContent = contact.heading;
      document.getElementById('contact-body').textContent = contact.body;
      document.getElementById('contact-address').textContent = org.address;
      document.getElementById('contact-phone').textContent = org.phone;
      document.getElementById('contact-phone').href = `tel:${org.phoneHref}`;
      document.getElementById('contact-email').textContent = org.email;
      document.getElementById('contact-email').href = `mailto:${org.email}`;
      document.getElementById('contact-form-note').textContent = contact.formNote;
      document.getElementById('contact-map').src = org.mapsEmbed;

      const hoursTable = document.getElementById('contact-hours-table');
      openingHours.forEach(o => {
        hoursTable.appendChild(el(`
          <tr class="border-b border-amber-900/10 last:border-0">
            <td class="py-1.5 text-[var(--text-muted)]">${o.day}</td>
            <td class="py-1.5 text-[var(--text-dark)] font-semibold text-right">${o.hours}</td>
          </tr>`));
      });

      document.getElementById('contact-form').addEventListener('submit', (e) => {
        e.preventDefault();
        document.getElementById('form-success').classList.remove('hidden');
        e.target.reset();
      });

      initScrollReveal();
    });
  </script>
</body>
</html>
